<!doctype html>
<html lang="am">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temsalet - Ethiopian Proverbs</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-amber-50/30 text-stone-800 min-h-screen flex flex-col justify-between font-sans"
  >
    <!-- Header -->
    <header
      class="border-b border-amber-100 bg-white/80 backdrop-blur sticky top-0 z-50"
    >
      <style>
        .btn-active-like {
          color: #ef4444 !important;
          transform: scale(1.2);
        }
        .btn-active-save {
          color: #3b82f6 !important;
          transform: scale(1.2);
        }
        .action-btn {
          transition: all 0.2s ease;
          cursor: pointer;
        }
      </style>
      <div
        class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <h1 class="text-2xl font-bold text-amber-700 tracking-wide">
          ተምሳሌት
          <span class="text-stone-500 font-normal text-lg">| Temsalet</span>
        </h1>
        <a
          href="https://github.com/beldados/temsalet"
          target="_blank"
          class="text-sm bg-stone-800 hover:bg-stone-700 text-white px-3 py-1.5 rounded-md transition"
          >GitHub</a
        >
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8 w-full flex-grow space-y-8">
      <!-- Intro -->
      <div class="text-center space-y-2">
        <h2 class="text-3xl font-extrabold text-stone-950">የአበው ምክርና ጥበብ</h2>
        <p class="text-stone-600 max-w-xl mx-auto">
          Explore, search, and preserve the rich wisdom embedded in traditional
          Ethiopian proverbs.
        </p>
      </div>

      <!-- Proverb of the Day Card -->
      <div
        class="bg-white border border-amber-200/60 rounded-xl p-6 shadow-sm relative overflow-hidden"
      >
        <div
          class="absolute top-0 left-0 h-1 w-full bg-gradient-to-r from-amber-500 to-yellow-500"
        ></div>
        <span
          class="text-xs font-semibold tracking-wider text-amber-600 uppercase"
          >የዕለቱ ምሳሌ • Proverb of the Day</span
        >
        <div class="mt-4 space-y-3">
          <p id="daily-amharic" class="text-2xl font-bold text-stone-900">
            ጭነት...
          </p>
          <p id="daily-english" class="text-lg italic text-stone-600">
            Loading...
          </p>
          <div class="pt-4 border-t border-stone-100 space-y-1">
            <p class="text-sm text-stone-500">
              <strong class="text-stone-700">ትርጉም:</strong>
              <span id="daily-meaning-am"></span>
            </p>
            <p class="text-sm text-stone-500">
              <strong class="text-stone-700">Meaning:</strong>
              <span id="daily-meaning-en"></span>
            </p>
          </div>
        </div>
        <button
          onclick="getRandomProverb()"
          class="mt-4 text-xs bg-amber-100 hover:bg-amber-200 text-amber-800 px-3 py-1.5 rounded-md transition font-medium"
        >
          ቀይር • New Proverb
        </button>
      </div>

      <!-- Search and Filter Section -->
      <div class="space-y-4">
        <!-- Search Input -->
        <input
          type="text"
          id="search-input"
          oninput="filterProverbs()"
          placeholder="Search proverbs, translations, or categories..."
          class="w-full px-4 py-3 border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white"
        />

        <!-- Fidel Alphabet Buttons -->
        <div
          class="flex flex-wrap gap-1.5 justify-center py-2"
          id="alphabet-filters"
        >
          <button
            onclick="showSavedOnly()"
            class="px-3 py-1 text-sm bg-blue-100 text-blue-700 rounded font-bold"
          >
            የተቀመጡ (Saved)
          </button>
        </div>
      </div>

      <!-- Proverbs Grid List -->
      <div id="proverbs-grid" class="grid gap-4 md:grid-cols-2">
        <!-- Dynamically populated -->
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="border-t border-stone-200/60 bg-stone-100 py-6 text-center text-sm text-stone-500"
    >
      <p>© 2026 Temsalet Project. Built for Ethiopian Wisdom preservation.</p>
    </footer>

    <!-- Frontend Logic -->
    <script>
      let proverbsList = [];
      let currentView = [];

      const fidelGroups = {
        ሀ: "ሀ",
        ሁ: "ሀ",
        ሂ: "ሀ",
        ሃ: "ሀ",
        ሄ: "ሀ",
        ህ: "ሀ",
        ሆ: "ሀ",
        ለ: "ለ",
        ሉ: "ለ",
        ሊ: "ለ",
        ላ: "ለ",
        ሌ: "ለ",
        ል: "ለ",
        ሎ: "ለ",
        መ: "መ",
        ሙ: "መ",
        ሚ: "መ",
        ማ: "መ",
        ሜ: "መ",
        ም: "መ",
        ሞ: "መ",
        ረ: "ረ",
        ሩ: "ረ",
        ሪ: "ረ",
        ራ: "ረ",
        ሬ: "ረ",
        ር: "ረ",
        ሮ: "ረ",
        ሰ: "ሰ",
        ሱ: "ሰ",
        ሲ: "ሰ",
        ሳ: "ሰ",
        ሴ: "ሰ",
        ስ: "ሰ",
        ሶ: "ሰ",
        አ: "አ",
        ኡ: "አ",
        ኢ: "አ",
        ኣ: "አ",
        ኤ: "አ",
        እ: "አ",
        ኦ: "አ",
      };

      async function fetchProverbs() {
        try {
          const response = await fetch("./proverbs.json");
          proverbsList = await response.json();
          currentView = proverbsList;
          getRandomProverb();
          generateAlphabetFilters();
          displayProverbs(currentView);
        } catch (error) {
          console.error("Error loading JSON:", error);
        }
      }

      function generateAlphabetFilters() {
        const letters = [
          ...new Set(
            proverbsList.map((p) => {
              const firstChar = p.proverb_amharic.trim().charAt(0);
              return fidelGroups[firstChar] || firstChar;
            }),
          ),
        ].sort();

        const container = document.getElementById("alphabet-filters");
        if (!container) return;

        container.innerHTML =
          '<button onclick="resetToAll()" class="px-3 py-1 text-sm bg-stone-200 hover:bg-stone-300 rounded transition font-medium">ሁሉንም (All)</button>';

        letters.forEach((letter) => {
          if (!letter) return;
          const btn = document.createElement("button");
          btn.className =
            "px-3 py-1 text-sm bg-amber-100 hover:bg-amber-200 text-amber-800 rounded transition font-semibold";
          btn.innerText = letter;
          btn.onclick = () => filterByLetter(letter);
          container.appendChild(btn);
        });
      }

      function resetToAll() {
        currentView = proverbsList;
        displayProverbs(currentView);
      }

      function filterByLetter(letter) {
        const baseRequested = fidelGroups[letter] || letter;
        currentView = proverbsList.filter((p) => {
          const firstChar = p.proverb_amharic.trim().charAt(0);
          const baseFirstChar = fidelGroups[firstChar] || firstChar;
          return baseFirstChar === baseRequested;
        });
        displayProverbs(currentView);
      }

      // --- LIKING AND SAVING LOGIC (The part that was 'not defined') ---
      window.toggleAction = function (id, storageKey) {
        console.log("Click registered for ID:", id);
        let list = JSON.parse(localStorage.getItem(storageKey) || "[]");
        const stringId = String(id);

        if (list.includes(stringId)) {
          list = list.filter((itemIdx) => itemIdx !== stringId);
        } else {
          list.push(stringId);
        }

        localStorage.setItem(storageKey, JSON.stringify(list));
        displayProverbs(currentView);
      };

      function displayProverbs(items) {
        const grid = document.getElementById("proverbs-grid");
        if (!grid) return;
        grid.innerHTML = "";

        const liked = JSON.parse(localStorage.getItem("likedProverbs") || "[]");
        const saved = JSON.parse(localStorage.getItem("savedProverbs") || "[]");

        items.forEach((item) => {
          const itemId = String(item.id);
          const isLiked = liked.includes(itemId);
          const isSaved = saved.includes(itemId);

          const card = document.createElement("div");
          card.className =
            "bg-white border border-stone-200 rounded-lg p-5 space-y-3 shadow-sm hover:border-amber-400 transition relative";

          card.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-[10px] bg-stone-100 text-stone-500 px-2 py-0.5 rounded uppercase font-bold tracking-wider">
                        ${item.category || "Wisdom"}
                    </span>
                    <div class="flex gap-4">
                        <button onclick="toggleAction('${itemId}', 'likedProverbs')" 
                                class="text-2xl transition-transform active:scale-125 cursor-pointer ${isLiked ? "text-red-500" : "text-stone-300"}">
                            ${isLiked ? "❤️" : "🤍"}
                        </button>
                        <button onclick="toggleAction('${itemId}', 'savedProverbs')" 
                                class="text-2xl transition-transform active:scale-125 cursor-pointer ${isSaved ? "text-blue-500" : "text-stone-300"}">
                            ${isSaved ? "🔖" : "📑"}
                        </button>
                    </div>
                </div>
                <p class="text-xl font-bold text-stone-800">${item.proverb_amharic}</p>
                <p class="text-md italic text-stone-600">${item.proverb_english}</p>
            `;
          grid.appendChild(card);
        });
      }

      function getRandomProverb() {
        const dailyAm = document.getElementById("daily-amharic");
        if (!dailyAm || proverbsList.length === 0) return;
        const randomItem =
          proverbsList[Math.floor(Math.random() * proverbsList.length)];
        dailyAm.innerText = randomItem.proverb_amharic;
        document.getElementById("daily-english").innerText =
          randomItem.proverb_english;
      }

      window.onload = fetchProverbs;
      console.log("✅ SCRIPT LOADED SUCCESSFULLY");
    </script>
  </body>
</html>
